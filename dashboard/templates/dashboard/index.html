<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радар продуктивности</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    {% csrf_token %}
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: { 1: '#0A0A0F', 2: '#13131F', 3: '#1A1A2E' },
                        accent: '#6366F1',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass-card {
            background: linear-gradient(145deg, rgba(26,26,46,0.8) 0%, rgba(19,19,31,0.95) 100%);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        .glass-card:hover { border-color: rgba(255,255,255,0.1); }
        .btn-primary {
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px -5px rgba(99,102,241,0.4);
        }
        .energy-dot { transition: all 0.15s ease; }
        .energy-dot:hover { transform: scale(1.25); }
        .habit-checkbox:checked + div {
            background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
            border-color: transparent;
        }
        .habit-checkbox:checked + div svg { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease forwards; }
        .chart-container { position: relative; height: 260px; }
    </style>
</head>
<body class="bg-surface-1 text-gray-200 min-h-screen" x-data="dashboard()" x-init="init()">

    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
        <!-- Header -->
        <header class="flex items-center justify-between mb-10 animate-fade-in">
            <div>
                <div class="flex items-center gap-3 mb-1">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                    </div>
                    <h1 class="text-2xl font-bold text-white tracking-tight">Радар продуктивности</h1>
                </div>
                <p class="text-sm text-gray-500 ml-11" x-text="formatDate(today)"></p>
            </div>
            <button @click="showAddModal = true" class="btn-primary px-4 py-2 rounded-lg text-sm font-medium text-white flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Новая привычка
            </button>
        </header>

        <!-- Stats Cards -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="glass-card rounded-xl p-5 animate-fade-in" style="animation-delay: 0.1s">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-xs font-medium text-gray-500 uppercase tracking-wider">Выполнение</span>
                    <div class="w-8 h-8 rounded-lg bg-emerald-500/10 flex items-center justify-center">
                        <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                </div>
                <div class="text-3xl font-bold text-white" x-text="stats.completion_rate + '%'"></div>
                <div class="text-xs text-gray-500 mt-1" x-text="stats.completed_entries + ' из ' + stats.total_entries"></div>
            </div>

            <div class="glass-card rounded-xl p-5 animate-fade-in" style="animation-delay: 0.2s">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-xs font-medium text-gray-500 uppercase tracking-wider">Лучший день</span>
                    <div class="w-8 h-8 rounded-lg bg-amber-500/10 flex items-center justify-center">
                        <svg class="w-4 h-4 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    </div>
                </div>
                <div class="text-3xl font-bold text-white" x-text="stats.best_day || '—'"></div>
                <div class="text-xs text-gray-500 mt-1" x-text="stats.best_day_rate ? stats.best_day_rate + '% эффективность' : 'Нет данных'"></div>
            </div>

            <div class="glass-card rounded-xl p-5 animate-fade-in" style="animation-delay: 0.3s">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-xs font-medium text-gray-500 uppercase tracking-wider">Энергия</span>
                    <div class="w-8 h-8 rounded-lg bg-rose-500/10 flex items-center justify-center">
                        <svg class="w-4 h-4 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                </div>
                <div class="text-3xl font-bold text-white" x-text="stats.avg_energy || '—'"></div>
                <div class="text-xs text-gray-500 mt-1">Средний уровень</div>
            </div>

            <div class="glass-card rounded-xl p-5 animate-fade-in" style="animation-delay: 0.4s">
                <div class="flex items-center justify-between mb-3">
                    <span class="text-xs font-medium text-gray-500 uppercase tracking-wider">Привычки</span>
                    <div class="w-8 h-8 rounded-lg bg-blue-500/10 flex items-center justify-center">
                        <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    </div>
                </div>
                <div class="text-3xl font-bold text-white" x-text="stats.total_habits"></div>
                <div class="text-xs text-gray-500 mt-1" x-text="stats.month_completed + ' выполнено за месяц'"></div>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Habits List -->
            <div class="lg:col-span-1 space-y-4">
                <h2 class="text-lg font-semibold text-white mb-4">Привычки на сегодня</h2>
                
                <template x-for="habit in habits" :key="habit.id">
                    <div class="glass-card rounded-xl p-4 animate-fade-in">
                        <div class="flex items-center gap-3 mb-3">
                            <label class="relative cursor-pointer flex-shrink-0">
                                <input type="checkbox" 
                                       class="habit-checkbox sr-only"
                                       :checked="isChecked(habit.id, today)"
                                       @change="toggleHabit(habit.id, today, $event.target.checked)">
                                <div class="w-6 h-6 rounded-md border-2 border-gray-600 flex items-center justify-center transition-all hover:border-indigo-400">
                                    <svg class="w-3.5 h-3.5 text-white hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                            </label>
                            <div class="w-3 h-3 rounded-full flex-shrink-0" :style="`background-color: ${habit.color}`"></div>
                            <span class="font-medium text-sm text-gray-200 flex-1" x-text="habit.name"></span>
                        </div>
                        
                        <div class="flex items-center justify-between pl-9">
                            <span class="text-xs text-gray-500">Энергия:</span>
                            <div class="flex gap-1.5">
                                <template x-for="n in 5" :key="n">
                                    <button @click="setEnergy(habit.id, today, n)"
                                            class="energy-dot w-6 h-6 rounded-full text-xs font-medium flex items-center justify-center transition-all"
                                            :class="getEnergyClass(habit.id, today, n)">
                                        <span x-text="n"></span>
                                    </button>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>

                <div x-show="habits.length === 0" class="glass-card rounded-xl p-8 text-center">
                    <div class="w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center mx-auto mb-3">
                        <svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    </div>
                    <p class="text-sm text-gray-400">Добавьте свою первую привычку</p>
                </div>
            </div>

            <!-- Chart & Breakdown -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Activity Chart -->
                <div class="glass-card rounded-xl p-6">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-lg font-semibold text-white">Активность за неделю</h2>
                        <div class="flex items-center gap-4 text-xs text-gray-500">
                            <span class="flex items-center gap-1.5">
                                <span class="w-2.5 h-2.5 rounded-full bg-indigo-500"></span>
                                Выполнение
                            </span>
                            <span class="flex items-center gap-1.5">
                                <span class="w-2.5 h-2.5 rounded-full bg-rose-500"></span>
                                Энергия
                            </span>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="activityChart"></canvas>
                    </div>
                </div>

                <!-- Weekday Breakdown -->
                <div class="glass-card rounded-xl p-6">
                    <h2 class="text-lg font-semibold text-white mb-5">Статистика по дням недели</h2>
                    <div class="space-y-3">
                        <template x-for="day in stats.weekday_breakdown" :key="day.day">
                            <div class="flex items-center gap-4">
                                <span class="text-sm text-gray-400 w-8" x-text="day.day"></span>
                                <div class="flex-1 h-2 bg-gray-800 rounded-full overflow-hidden">
                                    <div class="h-full rounded-full transition-all duration-500 ease-out"
                                         :class="day.rate >= 70 ? 'bg-emerald-500' : day.rate >= 40 ? 'bg-amber-500' : 'bg-rose-500'"
                                         :style="`width: ${day.rate}%`"></div>
                                </div>
                                <span class="text-sm font-medium text-gray-300 w-12 text-right" x-text="day.rate + '%'"></span>
                                <span class="text-xs text-gray-500 w-16 text-right" x-text="day.done + '/' + day.total"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Habit Modal -->
    <div x-show="showAddModal" 
         style="display: none;"
         class="fixed inset-0 z-50 flex items-center justify-center p-4"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" @click="showAddModal = false"></div>
        <div class="relative glass-card rounded-2xl p-6 w-full max-w-md"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100">
            <h3 class="text-xl font-bold text-white mb-5">Новая привычка</h3>
            <form @submit.prevent="addHabit()">
                <div class="mb-4">
                    <label class="block text-sm text-gray-400 mb-2">Название</label>
                    <input type="text" 
                           x-model="newHabit.name" 
                           required
                           class="w-full bg-surface-2 border border-gray-700 rounded-lg px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500 transition-colors"
                           placeholder="Например: Чтение 30 минут">
                </div>
                <div class="mb-6">
                    <label class="block text-sm text-gray-400 mb-2">Цвет</label>
                    <div class="flex gap-3 flex-wrap">
                        <template x-for="color in colors" :key="color">
                            <button type="button"
                                    @click="newHabit.color = color"
                                    class="w-8 h-8 rounded-full transition-transform hover:scale-110"
                                    :class="newHabit.color === color ? 'ring-2 ring-white ring-offset-2 ring-offset-surface-2 scale-110' : ''"
                                    :style="`background-color: ${color}`"></button>
                        </template>
                    </div>
                </div>
                <div class="flex gap-3 justify-end">
                    <button type="button" @click="showAddModal = false" 
                            class="px-4 py-2 rounded-lg text-sm text-gray-400 hover:text-white transition-colors">
                        Отмена
                    </button>
                    <button type="submit" class="btn-primary px-5 py-2 rounded-lg text-sm font-medium text-white">
                        Добавить
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function dashboard() {
            return {
                habits: {{ habits|safe }},
                today: '{{ today }}',
                showAddModal: false,
                newHabit: { name: '', color: '#6366F1' },
                colors: ['#6366F1', '#8B5CF6', '#EC4899', '#F43F5E', '#F59E0B', '#10B981', '#3B82F6', '#06B6D4'],
                stats: {
                    completion_rate: 0,
                    best_day: '—',
                    best_day_rate: 0,
                    avg_energy: 0,
                    total_habits: 0,
                    total_entries: 0,
                    completed_entries: 0,
                    month_completed: 0,
                    activity_chart: [],
                    weekday_breakdown: []
                },
                entries: {},
                chart: null,

                async init() {
                    await this.loadStats();
                    await this.loadEntries();
                    this.$nextTick(() => this.initChart());
                },

                async loadStats() {
                    const response = await fetch('/api/stats/');
                    this.stats = await response.json();
                },

                async loadEntries() {
                    const today = new Date().toISOString().split('T')[0];
                    const weekAgo = new Date(Date.now() - 6 * 86400000).toISOString().split('T')[0];
                    const response = await fetch(`/api/entries/?from=${weekAgo}&to=${today}`);
                    const entries = await response.json();
                    this.entries = {};
                    entries.forEach(e => {
                        const key = `${e.habit}_${e.date}`;
                        this.entries[key] = e;
                    });
                },

                isChecked(habitId, date) {
                    const key = `${habitId}_${date}`;
                    return this.entries[key]?.completed || false;
                },

                getEnergy(habitId, date) {
                    const key = `${habitId}_${date}`;
                    return this.entries[key]?.energy || 3;
                },

                getEnergyClass(habitId, date, n) {
                    const energy = this.getEnergy(habitId, date);
                    if (n === energy) {
                        const colors = ['bg-rose-600 text-white', 'bg-orange-600 text-white', 'bg-amber-600 text-white', 'bg-emerald-600 text-white', 'bg-emerald-500 text-white'];
                        return colors[n - 1] + ' ring-2 ring-white/30';
                    }
                    return 'bg-gray-800 text-gray-500 hover:bg-gray-700';
                },

                async toggleHabit(habitId, date, completed) {
                    const energy = this.getEnergy(habitId, date);
                    await this.submitCheck(habitId, date, completed, energy);
                },

                async setEnergy(habitId, date, energy) {
                    const completed = this.isChecked(habitId, date);
                    await this.submitCheck(habitId, date, completed, energy);
                },

                async submitCheck(habitId, date, completed, energy) {
                    try {
                        const response = await fetch('/api/check/', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': this.getCsrfToken() },
                            body: JSON.stringify({ habit_id: habitId, date, completed, energy })
                        });
                        const data = await response.json();
                        const key = `${habitId}_${date}`;
                        this.entries[key] = data;
                        await this.loadStats();
                        this.updateChart();
                    } catch (e) {
                        console.error('Error:', e);
                    }
                },

                async addHabit() {
                    try {
                        const response = await fetch('/api/habits/create/', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': this.getCsrfToken() },
                            body: JSON.stringify(this.newHabit)
                        });
                        if (response.ok) {
                            const habit = await response.json();
                            this.habits.push(habit);
                            this.newHabit = { name: '', color: '#6366F1' };
                            this.showAddModal = false;
                            await this.loadStats();
                        }
                    } catch (e) {
                        console.error('Error:', e);
                    }
                },

                getCsrfToken() {
                    return document.querySelector('[name=csrfmiddlewaretoken]').value;
                },

                formatDate(dateStr) {
                    const date = new Date(dateStr + 'T00:00:00');
                    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                    return date.toLocaleDateString('ru-RU', options);
                },

                initChart() {
                    const ctx = document.getElementById('activityChart');
                    if (!ctx || !this.stats.activity_chart.length) return;

                    const labels = this.stats.activity_chart.map(d => d.label);
                    const rates = this.stats.activity_chart.map(d => d.rate);
                    const energies = this.stats.activity_chart.map(d => d.energy * 20);

                    this.chart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels,
                            datasets: [
                                {
                                    label: 'Выполнение %',
                                    data: rates,
                                    backgroundColor: 'rgba(99, 102, 241, 0.7)',
                                    borderColor: 'rgba(99, 102, 241, 1)',
                                    borderWidth: 1,
                                    borderRadius: 6,
                                    barPercentage: 0.6,
                                },
                                {
                                    label: 'Энергия',
                                    data: energies,
                                    backgroundColor: 'rgba(244, 63, 94, 0.5)',
                                    borderColor: 'rgba(244, 63, 94, 0.8)',
                                    borderWidth: 1,
                                    borderRadius: 6,
                                    barPercentage: 0.6,
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: { intersect: false, mode: 'index' },
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: 'rgba(10, 10, 15, 0.9)',
                                    titleColor: '#fff',
                                    bodyColor: '#9CA3AF',
                                    borderColor: 'rgba(255,255,255,0.1)',
                                    borderWidth: 1,
                                    padding: 12,
                                    cornerRadius: 8,
                                    callbacks: {
                                        label: function(context) {
                                            const label = context.dataset.label || '';
                                            const value = context.dataset.label === 'Энергия' ? (context.raw / 20).toFixed(1) : context.raw;
                                            return label + ': ' + value;
                                        }
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    grid: { display: false, drawBorder: false },
                                    ticks: { color: '#6B7280', font: { size: 11 } }
                                },
                                y: {
                                    beginAtZero: true,
                                    max: 100,
                                    grid: { color: 'rgba(255,255,255,0.03)', drawBorder: false },
                                    ticks: { color: '#6B7280', font: { size: 11 }, callback: v => v + '%' }
                                }
                            }
                        }
                    });
                },

                updateChart() {
                    if (!this.chart || !this.stats.activity_chart.length) return;
                    this.chart.data.labels = this.stats.activity_chart.map(d => d.label);
                    this.chart.data.datasets[0].data = this.stats.activity_chart.map(d => d.rate);
                    this.chart.data.datasets[1].data = this.stats.activity_chart.map(d => d.energy * 20);
                    this.chart.update();
                }
            }
        }
    </script>
</body>
</html>
